<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad ERP SIMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand brand-simi" href="#">💊 Farmacias SIMI - Portal Seguro</a>
            <button id="btnLogout" class="btn btn-outline-danger btn-sm d-none" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container">
        <div id="loginView" class="row justify-content-center">
            <div class="col-md-5">
                <div class="card custom-card p-4">
                    <h5 class="mb-3 text-center text-primary">Autenticación (MFA)</h5>
                    <div id="loginError" class="alert alert-danger d-none small"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label small">Usuario</label>
                            <input type="text" class="form-control" id="username" value="admin" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Contraseña</label>
                            <input type="password" class="form-control" id="password" value="admin123" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-danger fw-bold">Token MFA (PIN 6 dígitos)</label>
                            <input type="text" class="form-control border-danger" id="mfaToken" placeholder="Ej: 123456" required>
                        </div>
                        <button type="submit" class="btn btn-simi w-100">Verificar Identidad</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="erpView" class="row d-none">
            <div class="col-md-4 mb-4">
                <div class="card custom-card p-4">
                    <h5 class="mb-3">Añadir Nuevo Producto</h5>
                    <form id="addForm">
                        <div class="mb-3">
                            <label class="form-label small">Nombre</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Descripción</label>
                            <input type="text" class="form-control" id="desc">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label small">Precio ($)</label>
                                <input type="number" class="form-control" id="precio" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label small">Stock</label>
                                <input type="number" class="form-control" id="stock" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-simi w-100">Guardar Producto</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card custom-card p-4">
                    <h5 class="mb-3">Inventario Actual</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                </tr>
                            </thead>
                            <tbody id="tablaProductos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Función para dar formato CLP (Ej: $ 1.500)
        const formatearCLP = (monto) => {
            return new Intl.NumberFormat('es-CL', {
                style: 'currency',
                currency: 'CLP',
                minimumFractionDigits: 0
            }).format(monto);
        };

        // Lógica de Autenticación MFA
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    mfaToken: document.getElementById('mfaToken').value
                })
            });
            const data = await res.json();
            
            if (res.ok) {
                localStorage.setItem('simi_token', data.token); // Guardamos el Token
                mostrarERP();
            } else {
                document.getElementById('loginError').textContent = data.error;
                document.getElementById('loginError').classList.remove('d-none');
            }
        });

        // Configuración de peticiones seguras inyectando el Token
        const fetchSeguro = async (url, options = {}) => {
            const token = localStorage.getItem('simi_token');
            const headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401 || res.status === 403) cerrarSesion();
            return res;
        };

        // Cargar productos con la vista original
        async function cargarProductos() {
            const res = await fetchSeguro('/api/productos');
            const data = await res.json();
            const tbody = document.getElementById('tablaProductos');
            tbody.innerHTML = '';
            
            data.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><span class="badge bg-secondary">${p.id}</span></td>
                        <td class="fw-bold">${p.nombre}</td>
                        <td class="text-muted small">${p.descripcion}</td>
                        <td class="fw-bold text-success">${formatearCLP(p.precio)}</td>
                        <td>${p.stock} un.</td>
                    </tr>
                `;
            });
        }

        // Agregar un producto nuevo
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetchSeguro('/api/productos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nombre: document.getElementById('nombre').value,
                    descripcion: document.getElementById('desc').value,
                    precio: document.getElementById('precio').value,
                    stock: document.getElementById('stock').value
                })
            });
            e.target.reset();
            cargarProductos();
        });

        // Muestra la vista del ERP ocultando el login
        function mostrarERP() {
            document.getElementById('loginView').classList.add('d-none');
            document.getElementById('erpView').classList.remove('d-none');
            document.getElementById('btnLogout').classList.remove('d-none');
            cargarProductos();
        }

        // Cierra sesión y recarga la página
        function cerrarSesion() {
            localStorage.removeItem('simi_token');
            window.location.reload();
        }

        // Auto-login si ya hay un token válido guardado
        if (localStorage.getItem('simi_token')) mostrarERP();
    </script>
</body>
</html>
