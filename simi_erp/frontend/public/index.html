<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Farmacias SIMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand brand-simi" href="#">💊 Farmacias SIMI</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card custom-card p-4">
                    <h5 class="mb-3">Añadir Nuevo Producto</h5>
                    <form id="addForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small mb-1">Nombre del producto</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small mb-1">Descripción</label>
                            <input type="text" class="form-control" id="desc">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted small mb-1">Precio ($)</label>
                                <input type="number" class="form-control" id="precio" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted small mb-1">Stock</label>
                                <input type="number" class="form-control" id="stock" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-simi w-100">Guardar Producto</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card custom-card p-4">
                    <h5 class="mb-3">Inventario Actual</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                </tr>
                            </thead>
                            <tbody id="tablaProductos">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Función para dar formato CLP (Ej: $ 1.500)
        const formatearCLP = (monto) => {
            return new Intl.NumberFormat('es-CL', {
                style: 'currency',
                currency: 'CLP',
                minimumFractionDigits: 0
            }).format(monto);
        };

        async function cargarProductos() {
            const res = await fetch('/api/productos');
            const data = await res.json();
            const tbody = document.getElementById('tablaProductos');
            tbody.innerHTML = '';
            
            data.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><span class="badge bg-secondary">${p.id}</span></td>
                        <td class="fw-bold">${p.nombre}</td>
                        <td class="text-muted small">${p.descripcion}</td>
                        <td class="fw-bold text-success">${formatearCLP(p.precio)}</td>
                        <td>${p.stock} un.</td>
                    </tr>
                `;
            });
        }

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nuevoProducto = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('desc').value,
                precio: document.getElementById('precio').value,
                stock: document.getElementById('stock').value
            };
            
            await fetch('/api/productos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevoProducto)
            });
            
            e.target.reset();
            cargarProductos();
        });

        // Carga inicial
        cargarProductos();
    </script>
</body>
</html>
